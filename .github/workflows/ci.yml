name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install API dependencies
        run: npm ci

      - name: Install & build React shop
        run: |
          cd client
          npm ci
          cp .env.example .env
          npm run build

      - name: Verify build output
        run: test -f client/dist/index.html
