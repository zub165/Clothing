name: Deploy to GoDaddy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Build React shop (production)
        run: |
          npm ci
          cd client
          npm ci
          cp .env.example .env
          npm run build
          test -f dist/index.html

  deploy:
    needs: build
    if: ${{ secrets.VPS_HOST != '' && secrets.VPS_USER != '' && secrets.SSH_PASSWORD != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="$HOME/clothing-business"; fi
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            chmod +x deploy/*.sh
            ./deploy/release.sh
